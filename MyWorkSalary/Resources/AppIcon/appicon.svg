<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="456" height="456" viewBox="0 0 456 456"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Gradient bakgrund -->
    <linearGradient id="iconGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E3C72"/>
      <stop offset="100%" stop-color="#2A5298"/>
    </linearGradient>
  </defs>

  <!-- Bakgrund -->
  <rect width="456" height="456" rx="96" fill="url(#iconGradient)"/>

  <!-- Subtil inner border -->
  <rect x="6" y="6" width="444" height="444"
        rx="90"
        fill="none"
        stroke="rgba(0,0,0,0.25)"
        stroke-width="2"/>

  <!-- Kort / dokument -->
  <rect x="108" y="132" width="240" height="192"
        rx="20"
        fill="#FFFFFF"
        opacity="0.95"/>

  <!-- Rader (lönedata) -->
  <rect x="140" y="170" width="176" height="16" rx="8" fill="#E3F2FD"/>
  <rect x="140" y="200" width="176" height="16" rx="8" fill="#E3F2FD"/>
  <rect x="140" y="230" width="120" height="16" rx="8" fill="#BBDEFB"/>

  <!-- Markerad rad (OB / summa) -->
  <rect x="140" y="260" width="176" height="18" rx="9" fill="#1E88E5"/>

</svg>